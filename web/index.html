<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sentinel CI — Suivi scolaire en Côte d'Ivoire. Veiller, pas surveiller.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B9D21">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sentinel CI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sentinel CI — Veiller, pas surveiller</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background-color: #1B9D21;
    }
    #chargement {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background-color: #1B9D21;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      z-index: 9999;
      transition: opacity .4s ease;
    }
    #chargement .titre { font-size: 26px; font-weight: 800; letter-spacing: .5px; }
    #chargement .slogan { margin-top: 6px; font-size: 14px; opacity: .9; }
    #chargement .rond {
      margin-top: 24px; width: 34px; height: 34px;
      border: 4px solid rgba(255,255,255,.35);
      border-top-color: #ffffff; border-radius: 50%;
      animation: tourner 1s linear infinite;
    }
    @keyframes tourner { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="chargement">
    <div class="titre">🛡️ Sentinel CI</div>
    <div class="slogan">Veiller, pas surveiller</div>
    <div class="rond"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Retire l'écran de chargement dès que Flutter a dessiné sa première image.
    window.addEventListener('flutter-first-frame', function () {
      var ecran = document.getElementById('chargement');
      if (ecran) {
        ecran.style.opacity = '0';
        setTimeout(function () { ecran.remove(); }, 450);
      }
    });
  </script>
</body>
</html>
