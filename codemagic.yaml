workflows:
  android-workflow:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Recuperer les paquets
        script: flutter pub get
      - name: Generer l icone
        script: dart run flutter_launcher_icons
      - name: Generer le splash
        script: dart run flutter_native_splash:create
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  web-workflow:
    name: Version Web
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - firebase
    scripts:
      - name: Recuperer les paquets
        script: flutter pub get
      - name: Build Web
        script: flutter build web --release --no-web-resources-cdn
      - name: Compresser le site
        script: cd build && zip -r web_sentinel_ci.zip web
      - name: Deployer sur Firebase Hosting
        script: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$CM_BUILD_DIR/cle_service_firebase.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$CM_BUILD_DIR/cle_service_firebase.json"
          npm install -g firebase-tools
          firebase deploy --only hosting --project sentinel-ci-c7592 --non-interactive
          rm -f "$CM_BUILD_DIR/cle_service_firebase.json"
    artifacts:
      - build/web_sentinel_ci.zip
